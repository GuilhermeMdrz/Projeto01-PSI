{% extends "base.html" %}

{% block title %}Login - Sistema de Estudos{% endblock %}

{% block content %}
<div class="container">
    <h2>Login</h2>

    <form method="POST" action="{{ url_for('login') }}">
        <label for="username">Email Escolar:</label>
        <input type="email" id="username" name="username" required>

        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Entrar</button>
    </form>

    <p>Ainda não tem uma conta? <a href="{{ url_for('registro') }}"><strong>Registre-se</strong></a></p>
</div>
{% endblock %}
