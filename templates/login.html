{% extends "base.html" %}

{% block title %}Login - Sistema de Estudos{% endblock %}

{% block css_extra %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="container">
    <h2>Acesso ao Sistema</h2>

    <form method="POST" action="{{ url_for('login') }}">
        <label for="username">Email Escolar:</label>
        <input type="email" id="username" name="username" class="input-padrao"  required>

        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" class="input-padrao" required>

        <button type="submit" class=" input-verde">Entrar</button>
    </form>

    <p class="links">Ainda não tem uma conta? <a href="{{ url_for('registro') }}"><strong>Registre-se</strong></a></p>
</div>
{% endblock %}
